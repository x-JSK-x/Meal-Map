
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMap</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --border: #e8e2d9;
      --text: #1a1714;
      --muted: #8a8078;
      --accent: #c8602a;
      --accent-light: #f5ede6;
      --cheat: #d4a017;
      --cheat-light: #fdf6e3;
      --tab-active: #1a1714;
      --tab-bg: #edeae5;
      --star: #c8602a;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 16px;
    }

    body.dark-mode {
      --bg: #0f1115;
      --surface: #171a21;
      --border: #262b36;
      --text: #eef1f6;
      --muted: #a6afbd;
      --accent-light: rgba(200, 96, 42, 0.18);
      --tab-active: #eef1f6;
      --tab-bg: #202534;
      --shadow: 0 2px 14px rgba(0,0,0,0.35);
      --cheat-light: rgba(212, 160, 23, 0.18);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .app-title span {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .fav-filter-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: transform 0.15s, background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .fav-filter-btn:active { transform: scale(0.98); }

    .fav-filter-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .theme-btn.active {
      border-color: var(--border);
      background: rgba(255,255,255,0.06);
    }

    .search-input {
      width: 270px;
      max-width: 40vw;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.86rem;
      outline: none;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(200, 96, 42, 0.14);
    }

    body.cheat-mode .search-input:focus {
      border-color: var(--cheat);
      box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.16);
    }

    .search-input.in-section {
      margin-left: auto;
      max-width: 44vw;
    }

    /* CHEAT DAY TOGGLE */
    .cheat-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cheat-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s;
    }

    .cheat-label.active {
      color: var(--cheat);
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 100px;
      transition: background 0.3s;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle-switch input:checked ~ .toggle-track {
      background: var(--cheat);
    }

    .toggle-switch input:checked ~ .toggle-thumb {
      transform: translateX(22px);
    }

    .cheat-badge {
      display: none !important;
      visibility: hidden;
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--cheat);
      color: white;
      padding: 2px 8px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .cheat-badge.visible { display: none !important; visibility: hidden; }

    /* TABS */
    .tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 1;
      min-width: 70px;
      padding: 10px 6px;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn .tab-emoji {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 3px;
    }

    .tab-btn.active {
      color: var(--tab-active);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    body.cheat-mode .tab-btn.active {
      border-bottom-color: var(--cheat);
    }

    /* CHEAT MODE STYLES */
    body.cheat-mode header {
      background: var(--cheat-light);
    }

    body.dark-mode.cheat-mode header {
      background: var(--surface);
    }

    body.cheat-mode {
      background: var(--bg);
    }

    /* MAIN CONTENT */
    main {
      padding: 24px 16px;
      max-width: 680px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text);
    }

    .section-emoji { font-size: 1.5rem; }

    .mode-tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--accent-light);
      color: var(--accent);
    }

    body.cheat-mode .mode-tag {
      background: var(--cheat-light);
      color: var(--cheat);
    }

    /* MEAL CARDS */
    .meal-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: slideIn 0.25s ease both;
    }

    .meal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .meal-card:active {
      transform: scale(0.98);
    }

    body.cheat-mode .meal-card {
      border-color: #ffffff;
    }

    .meal-info {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      cursor: pointer;
      user-select: none;
    }

    .meal-notes {
      display: none;
      border-top: 1px dashed var(--border);
      padding-top: 10px;
    }

    .meal-card.expanded .meal-notes { display: block; }

    .notes-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .notes-area {
      width: 100%;
      min-height: 64px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.02);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }

    body.dark-mode .notes-area {
      background: rgba(255,255,255,0.04);
    }

    .notes-area:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(200, 96, 42, 0.14);
    }

    body.cheat-mode .notes-area:focus {
      border-color: var(--cheat);
      box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.16);
    }

    .meal-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .meal-name {
      font-size: 0.97rem;
      font-weight: 500;
      color: var(--text);
    }

    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: #ccc;
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
      padding: 4px;
      line-height: 1;
    }

    .fav-btn.starred {
      color: var(--star);
      transform: scale(0.8);
    }

    .fav-btn:active {
      transform: scale(0.85);
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty p { font-size: 0.9rem; }

    /* FAVS SECTION */
    .favs-section {
      margin-bottom: 28px;
    }

    .favs-heading {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* RESPONSIVE */
    @media (min-width: 480px) {
      .app-title { font-size: 1.9rem; }
      .tab-btn { font-size: 0.88rem; }
      main { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1 class="app-title">Meal<span>Map</span></h1>
    <div class="header-actions">
      <button class="fav-filter-btn" id="favFilterBtn" type="button" aria-pressed="false">⭐ Nur Favoriten: Aus</button>
      <button class="fav-filter-btn theme-btn" id="themeBtn" type="button" aria-pressed="false">🌙 Darkmode: Aus</button>
      <div class="cheat-toggle">
        <span class="cheat-label" id="cheatLabel">Cheat Day</span>
        <label class="toggle-switch" aria-label="Cheat Day umschalten">
          <input type="checkbox" id="cheatToggle" />
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
        <span class="cheat-badge" id="cheatBadge"></span>
      </div>
    </div>
  </div>
  <nav class="tabs" role="tablist">
    <button class="tab-btn active" role="tab" data-tab="fruehstueck">
      <span class="tab-emoji">🌅</span>Frühstück
    </button>
    <button class="tab-btn" role="tab" data-tab="mittagessen">
      <span class="tab-emoji">☀️</span>Mittag
    </button>
    <button class="tab-btn" role="tab" data-tab="abendessen">
      <span class="tab-emoji">🌙</span>Abend
    </button>
    <button class="tab-btn" role="tab" data-tab="snacks">
      <span class="tab-emoji">🍎</span>Snacks
    </button>
  </nav>
</header>

<main>
  <!-- FRÜHSTÜCK -->
  <div class="tab-content active" id="tab-fruehstueck">
    <div class="section-header">
      <span class="section-emoji">🌅</span>
      <h2 class="section-title">Frühstück</h2>
      <span class="mode-tag" id="mode-fruehstueck">Normal</span>
      <input class="search-input in-section" id="searchInput" type="search" inputmode="search" placeholder="Suche (ID/Name) im Tab…" aria-label="Suche in aktiver Kategorie" />
    </div>
    <div class="meal-list" id="list-fruehstueck"></div>
  </div>

  <!-- MITTAGESSEN -->
  <div class="tab-content" id="tab-mittagessen">
    <div class="section-header">
      <span class="section-emoji">☀️</span>
      <h2 class="section-title">Mittagessen</h2>
      <span class="mode-tag" id="mode-mittagessen">Normal</span>
    </div>
    <div class="meal-list" id="list-mittagessen"></div>
  </div>

  <!-- ABENDESSEN -->
  <div class="tab-content" id="tab-abendessen">
    <div class="section-header">
      <span class="section-emoji">🌙</span>
      <h2 class="section-title">Abendessen</h2>
      <span class="mode-tag" id="mode-abendessen">Normal</span>
    </div>
    <div class="meal-list" id="list-abendessen"></div>
  </div>

  <!-- SNACKS -->
  <div class="tab-content" id="tab-snacks">
    <div class="section-header">
      <span class="section-emoji">🍎</span>
      <h2 class="section-title">Snacks</h2>
      <span class="mode-tag" id="mode-snacks">Normal</span>
    </div>
    <div class="meal-list" id="list-snacks"></div>
  </div>
</main>

<script>
  // ──────────────────────────────────────────────
  //  DATEN
  // ──────────────────────────────────────────────
  const meals = {
    fruehstueck: {
      normal: [
        { id: 'f1', name: 'Käsebrötchen',     icon: '🥐' },
        { id: 'f2', name: 'Laugenstange',     icon: '🥨' },
        { id: 'f3', name: 'Proteinpudding',   icon: '🍮' },
        { id: 'f4', name: 'yfood choco',      icon: '🥤' },
        { id: 'f5', name: '(More) Milchreis', icon: '🍚' },
      ],
      cheat: [
        { id: 'fc1', name: 'Schokopudding', icon: '🍫' },
        { id: 'fc2', name: 'Schokokuss',    icon: '🍬' },
        { id: 'fc3', name: 'Croissant',     icon: '🥐' },
      ],
    },
    mittagessen: {
      normal: [
        { id: 'm1', name: 'Hähnchen mit Reis', icon: '🍗' },
        { id: 'm2', name: 'Nudeln',            icon: '🍝' },
        { id: 'm3', name: 'Salat',             icon: '🥗' },
      ],
      cheat: [
        { id: 'mc1', name: 'Pommes',  icon: '🍟' },
        { id: 'mc2', name: 'Burger',  icon: '🍔' },
        { id: 'mc3', name: 'Pizza',   icon: '🍕' },
      ],
    },
    abendessen: {
      normal: [
        { id: 'a1', name: 'Suppe',         icon: '🍲' },
        { id: 'a2', name: 'Wraps',         icon: '🌯' },
        { id: 'a3', name: 'Brot mit Käse', icon: '🧀' },
      ],
      cheat: [
        { id: 'ac1', name: 'Döner',      icon: '🥙' },
        { id: 'ac2', name: 'Currywurst', icon: '🌭' },
      ],
    },
    snacks: {
      normal: [
        { id: 's1', name: 'Obst',   icon: '🍇' },
        { id: 's2', name: 'Nüsse',  icon: '🥜' },
        { id: 's3', name: 'Joghurt', icon: '🫙' },
      ],
      cheat: [
        { id: 'sc1', name: 'Chips',       icon: '🍿' },
        { id: 'sc2', name: 'Gummibärchen', icon: '🐻' },
        { id: 'sc3', name: 'Schokolade',  icon: '🍫' },
      ],
    },
  };

  // ──────────────────────────────────────────────
  //  STATE
  // ──────────────────────────────────────────────
  let isCheatDay = false;
  const favorites = new Set();
  let showOnlyFavs = false;
  let isDarkMode = false;
  let searchQuery = '';
  let activeCategory = 'fruehstueck';

  // ──────────────────────────────────────────────
  //  RENDER
  // ──────────────────────────────────────────────
  const categories = ['fruehstueck', 'mittagessen', 'abendessen', 'snacks'];

  function renderAll() {
    categories.forEach(cat => renderCategory(cat));
    updateModeTags();
  }

  function renderCategory(cat) {
    const mode = isCheatDay ? 'cheat' : 'normal';
    const list = document.getElementById('list-' + cat);
    const allItems = meals[cat][mode];
    const favFiltered = showOnlyFavs ? allItems.filter(m => favorites.has(m.id)) : allItems;
    const q = searchQuery.trim().toLowerCase();
    const items = q
      ? favFiltered.filter(m => (m.id && m.id.toLowerCase().includes(q)) || (m.name && m.name.toLowerCase().includes(q)))
      : favFiltered;

    list.innerHTML = '';

    if (!items || items.length === 0) {
      const msg = showOnlyFavs ? 'Noch keine Favoriten markiert.' : 'Keine Gerichte vorhanden.';
      list.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><p>${msg}</p></div>`;
      return;
    }

    items.forEach((meal, i) => {
      const isFav = favorites.has(meal.id);
      const card = document.createElement('div');
      card.className = 'meal-card';
      card.style.animationDelay = (i * 0.05) + 's';
      const noteKey = 'mealmap_note_' + meal.id;
      let noteText = '';
      try { noteText = localStorage.getItem(noteKey) || ''; } catch (e) {}
      card.innerHTML = `
        <div class="meal-row">
          <div class="meal-info" data-action="toggle-notes" data-id="${meal.id}">
            <span class="meal-icon">${meal.icon}</span>
            <span class="meal-name">${meal.name}</span>
          </div>
          <button class="fav-btn ${isFav ? 'starred' : ''}"
                  aria-label="${isFav ? 'Favorit entfernen' : 'Als Favorit markieren'}"
                  data-id="${meal.id}">
            ${isFav ? '⭐' : '☆'}
          </button>
        </div>
        <div class="meal-notes" aria-label="Notizen">
          <div class="notes-label">Notizen</div>
          <textarea class="notes-area" data-id="${meal.id}" placeholder="Zubereitung / Notizen…"></textarea>
        </div>
      `;
      list.appendChild(card);

      const area = card.querySelector('.notes-area');
      if (area) area.value = noteText;

      const info = card.querySelector('.meal-info');
      if (info) {
        info.addEventListener('click', () => {
          card.classList.toggle('expanded');
          if (card.classList.contains('expanded') && area) area.focus();
        });
      }

      if (area) {
        area.addEventListener('click', (e) => e.stopPropagation());
        area.addEventListener('input', () => {
          try { localStorage.setItem(noteKey, area.value || ''); } catch (e) {}
        });
      }
    });

    // Fav-Button Events
    list.querySelectorAll('.fav-btn').forEach(btn => {
      btn.addEventListener('click', () => toggleFav(btn.dataset.id, cat));
    });
  }

  function toggleFav(id, cat) {
    if (favorites.has(id)) {
      favorites.delete(id);
    } else {
      favorites.add(id);
    }
    renderCategory(cat);
  }

  function updateModeTags() {
    const label = isCheatDay ? '🎉 Cheat Day' : 'Normal';
    categories.forEach(cat => {
      const tag = document.getElementById('mode-' + cat);
      if (tag) tag.textContent = label;
    });
  }

  // ──────────────────────────────────────────────
  //  TABS
  // ──────────────────────────────────────────────
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabContents = document.querySelectorAll('.tab-content');

  function moveSearchToActiveHeader() {
    const activeHeader = document.querySelector('.tab-content.active .section-header');
    if (!activeHeader) return;
    if (searchInput && searchInput.parentElement !== activeHeader) {
      activeHeader.appendChild(searchInput);
    }
  }

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      tabContents.forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.tab;
      document.getElementById('tab-' + activeCategory).classList.add('active');
      moveSearchToActiveHeader();
      renderCategory(activeCategory);
    });
  });

  // ──────────────────────────────────────────────
  //  CHEAT DAY TOGGLE
  // ──────────────────────────────────────────────
  const favFilterBtn = document.getElementById('favFilterBtn');
  const themeBtn = document.getElementById('themeBtn');
  const searchInput = document.getElementById('searchInput');
  const cheatToggle = document.getElementById('cheatToggle');
  const cheatLabel = document.getElementById('cheatLabel');
  const cheatBadge = document.getElementById('cheatBadge');

  function applyThemeUI() {
    document.body.classList.toggle('dark-mode', isDarkMode);
    themeBtn.classList.toggle('active', isDarkMode);
    themeBtn.setAttribute('aria-pressed', String(isDarkMode));
    themeBtn.textContent = isDarkMode ? '☀️ Darkmode: An' : '🌙 Darkmode: Aus';
  }

  // Init Theme (localStorage → sonst System)
  try {
    const saved = localStorage.getItem('mealmap_theme');
    if (saved === 'dark') isDarkMode = true;
    else if (saved === 'light') isDarkMode = false;
    else isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  } catch (e) {}
  applyThemeUI();

  favFilterBtn.addEventListener('click', () => {
    showOnlyFavs = !showOnlyFavs;
    favFilterBtn.classList.toggle('active', showOnlyFavs);
    favFilterBtn.setAttribute('aria-pressed', String(showOnlyFavs));
    favFilterBtn.textContent = showOnlyFavs ? '⭐ Nur Favoriten: An' : '⭐ Nur Favoriten: Aus';
    renderCategory(activeCategory);
  });

  themeBtn.addEventListener('click', () => {
    isDarkMode = !isDarkMode;
    applyThemeUI();
    try {
      localStorage.setItem('mealmap_theme', isDarkMode ? 'dark' : 'light');
    } catch (e) {}
  });

  cheatToggle.addEventListener('change', () => {
    isCheatDay = cheatToggle.checked;
    document.body.classList.toggle('cheat-mode', isCheatDay);
    cheatLabel.classList.toggle('active', isCheatDay);
    cheatBadge.classList.toggle('visible', isCheatDay);
    renderCategory(activeCategory);
  });

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value || '';
    renderCategory(activeCategory);
  });

  // ──────────────────────────────────────────────
  //  INIT
  // ──────────────────────────────────────────────
  renderAll();
  const initialActiveBtn = document.querySelector('.tab-btn.active');
  if (initialActiveBtn && initialActiveBtn.dataset && initialActiveBtn.dataset.tab) {
    activeCategory = initialActiveBtn.dataset.tab;
  }
</script>
</body>
</html>
